<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Benutzerprofil - MQL Trade Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Inline styles similar to admin.html for consistency without overriding global css completely -->
    <style>
        :root {
            --bg-page: #0d1117;
            --bg-panel: #161b22;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-primary: #58a6ff;
            --accent-success: #238636;
            --accent-danger: #da3633;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .btn {
            background-color: var(--bg-panel);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: var(--text-secondary);
        }

        .btn-primary {
            background-color: var(--accent-success);
            color: white;
            border-color: rgba(240, 246, 252, 0.1);
        }

        .btn-primary:hover {
            background-color: #2ea043;
            border-color: rgba(240, 246, 252, 0.1);
        }

        .panel {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 600;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-page);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            box-sizing: border-box;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background-color: rgba(35, 134, 54, 0.1);
            color: #3fb950;
            border: 1px solid rgba(35, 134, 54, 0.4);
        }

        .alert-error {
            background-color: rgba(218, 54, 51, 0.1);
            color: #ff7b72;
            border: 1px solid rgba(218, 54, 51, 0.4);
        }

        .user-info {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .info-row {
            display: flex;
            margin-bottom: 10px;
        }

        .info-label {
            width: 150px;
            color: var(--text-secondary);
        }

        .info-value {
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h2>👤 Benutzerprofil</h2>
            <a href="/" class="btn">🏠 Zurück zum Dashboard</a>
        </header>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}">Aktion erfolgreich!</div>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}">Ein Fehler ist aufgetreten!
        </div>

        <div class="panel">
            <div class="user-info">
                <div class="info-row">
                    <div class="info-label">Benutzername:</div>
                    <div class="info-value" th:text="${currentUser.username}">Username</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Rolle:</div>
                    <div class="info-value">
                        <span th:text="${currentUser.role}"
                            th:style="${currentUser.role == 'ROLE_ADMIN'} ? 'color:#ff7b72;' : 'color:#58a6ff;'">
                        </span>
                    </div>
                </div>
            </div>

            <div th:if="${currentUser.role != 'ROLE_DEMO'}">
                <h3 style="margin-top: 0; margin-bottom: 20px;">Passwort ändern</h3>
                <form th:action="@{/profile/change-password}" method="post">
                    <div class="form-group">
                        <label>Neues Passwort:</label>
                        <input type="password" name="newPassword" required minlength="4">
                    </div>
                    <div class="form-group">
                        <label>Passwort bestätigen:</label>
                        <input type="password" name="confirmPassword" required minlength="4">
                    </div>
                    <div style="text-align: right;">
                        <button type="submit" class="btn btn-primary">Passwort speichern</button>
                    </div>
                </form>
            </div>
            <div th:if="${currentUser.role == 'ROLE_DEMO'}" class="alert alert-success">
                💡 Als Demo-Benutzer können Sie Ihr Passwort nicht ändern.
            </div>
        </div>
    </div>
</body>

</html>
