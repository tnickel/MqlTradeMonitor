<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login - Trade Monitor</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020617;
            overflow: hidden;
            position: relative;
        }

        /* ── Background layers ── */
        .bg-base {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(to bottom, rgba(2, 6, 23, 0.7), rgba(2, 6, 23, 0.9)),
                url('/img/trading-bg.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        /* Ambient glow orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            opacity: 0.6;
            animation: drift 15s ease-in-out infinite;
        }
        .orb-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.3) 0%, transparent 70%);
            top: -200px; left: -200px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.2) 0%, transparent 70%);
            bottom: -150px; right: -150px;
            animation-delay: -7s;
        }
        
        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50%       { transform: translate(40px, 40px) scale(1.1); }
        }

        /* Subtle grid */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 2;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        /* ── Card ── */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        /* ── Logo / header ── */
        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }

        .logo-icon svg {
            width: 32px;
            height: 32px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .app-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: #f8fafc;
            letter-spacing: -0.025em;
        }

        .app-brand {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            margin-top: 0.5rem;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            margin: 2rem 0;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            background: rgba(2, 6, 23, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #f8fafc;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #3b82f6;
            background: rgba(2, 6, 23, 0.6);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        /* ── Submit ── */
        .btn-submit {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* ── Footer ── */
        .card-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #64748b;
        }

        .card-footer a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }
        .card-footer a:hover { color: #3b82f6; }
    </style>
</head>

<body>
    <div class="bg-base"></div>
    <div class="bg-dots"></div>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-wrapper">
        <div class="login-card">

            <div class="logo-area">
                <!-- Trading chart icon -->
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <polyline points="2 17 7 9 12 13 17 6 22 10"
                            stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="7"  cy="9"  r="1.5" fill="rgba(255,255,255,0.6)"/>
                        <circle cx="12" cy="13" r="1.5" fill="rgba(255,255,255,0.6)"/>
                        <circle cx="17" cy="6"  r="1.5" fill="rgba(255,255,255,0.6)"/>
                        <line x1="2" y1="21" x2="22" y2="21"
                            stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="app-title">Trade Monitor</div>
                <div class="app-brand">KI Software Schmiede</div>
            </div>

            <div class="divider"></div>

            <div th:if="${param.error}" class="message message-error">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="message message-success">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
                You have been logged out successfully.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <input type="text" name="username" placeholder="Enter username" required autofocus autocomplete="username" />
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input type="password" name="password" placeholder="Enter password" required autocomplete="current-password" />
                    </div>
                </div>

                <button type="submit" class="btn-submit">Sign In &nbsp;→</button>
            </form>

            <div class="card-footer" style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 0.75rem;">
                <div style="font-size: 0.8125rem; color: #64748b;">
                    &copy; 2026 <a href="https://www.ki-software-schmiede.de" target="_blank" style="color: #3b82f6; text-decoration: none; font-weight: 500;">KI Software Schmiede</a>
                </div>
                <div style="display: flex; justify-content: center; gap: 1.25rem; font-size: 0.75rem; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 700;">
                    <a href="/impressum" style="color: #475569; text-decoration: none; transition: color 0.2s;">Impressum</a>
                    <a href="/privacy" style="color: #475569; text-decoration: none; transition: color 0.2s;">Datenschutz</a>
                    <a href="https://www.ki-software-schmiede.de" style="color: #475569; text-decoration: none; transition: color 0.2s;">Support</a>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
