server.port=8080
spring.application.name=TradeMonitor

# Import external secrets file (not stored in Git)
spring.config.import=optional:file:${user.home}/trademonitor_data/secrets.properties

# Thymeleaf settings
spring.thymeleaf.cache=false

# H2 Database (file-based, persistent)
spring.datasource.url=jdbc:h2:file:${user.home}/trademonitor_data/trademonitor;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${TRADEMONITOR_DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# HikariCP Database Connection Pool Optimization
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# H2 Console (for debugging) — the servlet is not registered unless explicitly
# enabled at process startup. The runtime admin gate and ROLE_ADMIN are additional
# controls, not substitutes for disabling the production attack surface.
spring.h2.console.enabled=${TRADEMONITOR_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Account timeout in seconds (mark offline after no heartbeat)
account.timeout.seconds=120


# Max HTTP request body size (for large trade list uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-content-size=-1
server.tomcat.max-swallow-size=-1
server.tomcat.connection-timeout=300s


# Web UI Authentication (Change these in production or launch with --app.admin.password=...)
app.admin.username=admin
app.admin.password=password

# Security Hardening
server.error.include-stacktrace=never
server.server-header=
server.tomcat.max-connections=200
server.tomcat.threads.max=50

# Homey Webhook Integration
# The Homey ID and Event are configured through the Admin Web Interface and stored in the local H2 DB.

# Do not log principals, protected request paths or session identifiers in production.
logging.level.org.springframework.security=INFO
