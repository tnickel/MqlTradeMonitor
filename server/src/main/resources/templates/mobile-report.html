<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trade Monitor - Mobile Report</title>
    <link rel="stylesheet" th:href="@{/css/mobile.css(v=1)}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <style>
        .period-switcher {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            padding: 0.5rem;
            background: var(--bg-card);
            border-radius: 0.75rem;
            border: 1px solid var(--border);
        }

        .period-btn {
            flex: 1;
            padding: 0.6rem 0.25rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .period-btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .report-table th {
            text-align: left;
            padding: 0.75rem 0.5rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .report-table td {
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .chart-container {
            background: var(--bg-card);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
            height: 250px;
        }
    </style>
</head>

<body>
    <div class="mobile-container">
        <header class="mobile-header">
            <div>
                <h1 th:text="${periodTitle}">Report</h1>
                <div style="font-size: 0.85rem; color: var(--accent); font-weight: 600; font-family: monospace; margin-top: 2px;">
                    <span th:text="${startDate}">01.01</span> - <span th:text="${endDate}">31.01</span>
                </div>
            </div>
            <a href="/" class="nav-icon">📊</a>
        </header>

        <div class="period-switcher">
            <a th:href="@{/report/daily}" th:classappend="${period == 'daily' ? 'active' : ''}" class="period-btn">Daily</a>
            <a th:href="@{/report/weekly}" th:classappend="${period == 'weekly' ? 'active' : ''}" class="period-btn">Weekly</a>
            <a th:href="@{/report/monthly}" th:classappend="${period == 'monthly' ? 'active' : ''}" class="period-btn">Monthly</a>
        </div>

        <div class="chart-container">
            <canvas id="performanceChart"></canvas>
        </div>

        <div th:each="acc : ${reportData}" class="account-card" style="padding: 1rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
                <div style="font-weight: 700; color: var(--accent);" th:text="${acc.name}">Account Name</div>
                <div th:classappend="${acc.type == 'REAL' ? 'badge-real' : 'badge-demo'}" 
                     style="font-size: 0.6rem; padding: 0.2rem 0.5rem; border-radius: 4px; border: 1px solid currentColor;" 
                     th:text="${acc.type}">REAL</div>
            </div>

            <div class="metrics-grid">
                <div class="metric-item">
                    <div class="metric-label">Closed Profit</div>
                    <div th:class="${acc.closedProfit >= 0 ? 'profit-positive' : 'profit-negative'}" 
                         th:text="(${acc.closedProfit >= 0 ? '+' : ''}) + ${#numbers.formatDecimal(acc.closedProfit, 1, 2)} + ' ' + ${acc.currency}">+0.00</div>
                    <div style="font-size: 0.7rem; margin-top: 2px;"
                         th:classappend="${acc.profit == 0 ? 'neutral' : (acc.profit > 0 ? 'profit-positive' : 'profit-negative')}">
                        <span th:text="${#numbers.formatDecimal(acc.profit, 1, 2)}">0.00</span> Open
                    </div>
                </div>
                <div class="metric-item" style="text-align: right;">
                    <div class="metric-label">Closed Trades</div>
                    <div class="metric-value" th:text="${acc.closedCount}">0</div>
                    <div style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 2px;">
                        <span th:text="${acc.trades}">0</span> Open
                    </div>
                </div>
            </div>
        </div>

        <!-- Spacer for nav -->
        <div style="height: 80px;"></div>

        <nav class="bottom-nav">
            <a href="/report/daily" class="nav-item active">
                <span class="nav-icon">📋</span>
                <span>Report</span>
            </a>
            <a href="/mobile/drawdown" class="nav-item">
                <span class="nav-icon">📉</span>
                <span>Drawdown</span>
            </a>
            <a th:if="${currentUser.role == 'ROLE_ADMIN'}" href="/admin" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span>Admin</span>
            </a>
        </nav>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const period = /*[[${period}]]*/ 'daily';
        /*]]>*/

        document.addEventListener('DOMContentLoaded', () => {
            fetch(`/api/report-scaled-curves/${period}`)
                .then(r => r.json())
                .then(data => {
                    if (data.length === 0) return;
                    
                    const ctx = document.getElementById('performanceChart').getContext('2d');
                    const datasets = data.map((acc, idx) => {
                        const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
                        const color = colors[idx % colors.length];
                        
                        return {
                            label: acc.name,
                            data: acc.timestamps.map((ts, i) => ({ x: new Date(ts), y: acc.scaledEquity[i] })),
                            borderColor: color,
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: false,
                            tension: 0.3
                        };
                    });

                    new Chart(ctx, {
                        type: 'line',
                        data: { datasets },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                x: {
                                    type: 'time',
                                    time: { unit: 'day' },
                                    display: false
                                },
                                y: {
                                    ticks: { color: '#94a3b8', font: { size: 10 } },
                                    grid: { color: 'rgba(255,255,255,0.05)' }
                                }
                            }
                        }
                    });
                });
        });
    </script>
</body>

</html>
