<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login - Trade Monitor</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020617;
            overflow: hidden;
            position: relative;
        }

        /* ── Background layers ── */
        .bg-base {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(to bottom, rgba(2, 6, 23, 0.7), rgba(2, 6, 23, 0.9)),
                url('/img/trading-bg.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        /* Ambient glow orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            opacity: 0.6;
            animation: drift 15s ease-in-out infinite;
        }
        .orb-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.3) 0%, transparent 70%);
            top: -200px; left: -200px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.2) 0%, transparent 70%);
            bottom: -150px; right: -150px;
            animation-delay: -7s;
        }
        
        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50%       { transform: translate(40px, 40px) scale(1.1); }
        }

        /* Subtle grid */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 2;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        /* ── Card ── */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        /* ── Logo / header ── */
        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }

        .logo-icon svg {
            width: 32px;
            height: 32px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .app-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: #f8fafc;
            letter-spacing: -0.025em;
        }

        .app-brand {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            margin-top: 0.5rem;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            margin: 2rem 0;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            background: rgba(2, 6, 23, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #f8fafc;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #3b82f6;
            background: rgba(2, 6, 23, 0.6);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        /* ── Submit ── */
        .btn-submit {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* ── Footer ── */
        .card-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #64748b;
        }

        .card-footer a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }
        .card-footer a:hover { color: #3b82f6; }
    </style>
</head>

<body>
    <div class="bg-base"></div>
    <div class="bg-dots"></div>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-wrapper">
        <div class="login-card">

            <div class="logo-area">
                <!-- Trading chart icon -->
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <polyline points="2 17 7 9 12 13 17 6 22 10"
                            stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="7"  cy="9"  r="1.5" fill="rgba(255,255,255,0.6)"/>
                        <circle cx="12" cy="13" r="1.5" fill="rgba(255,255,255,0.6)"/>
                        <circle cx="17" cy="6"  r="1.5" fill="rgba(255,255,255,0.6)"/>
                        <line x1="2" y1="21" x2="22" y2="21"
                            stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="app-title">Trade Monitor</div>
                <div class="app-brand">tnickel-ki</div>
            </div>

            <div class="divider"></div>

            <div th:if="${param.error}" class="message message-error">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="message message-success">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
                You have been logged out successfully.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <input type="text" name="username" placeholder="Enter username" required autofocus autocomplete="username" />
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input type="password" name="password" placeholder="Enter password" required autocomplete="current-password" />
                    </div>
                </div>

                <button type="submit" class="btn-submit">Sign In &nbsp;→</button>
                <button type="button" class="btn-submit" onclick="submitDemoLogin()" style="background: linear-gradient(135deg, #475569, #334155); margin-top: 0.75rem;">
                    Try Demo &nbsp;🚀
                </button>
                <a href="/trademonitor_v1.1.apk" download style="text-decoration: none; display: block; width: 100%;">
                    <button type="button" class="btn-submit" style="background: linear-gradient(135deg, #059669, #047857); margin-top: 0.75rem; display: flex; align-items: center; justify-content: center; width: 100%;">
                        Download Android App &nbsp;📱
                    </button>
                </a>
            </form>

            <form id="demoLoginForm" th:action="@{/demo-login}" method="post" style="display: none;"></form>
            <script>
                function submitDemoLogin() {
                    document.getElementById('demoLoginForm').submit();
                }

                // APK Progress Download Modal
                document.addEventListener('DOMContentLoaded', () => {
                    const downloadLink = document.querySelector('a[href*="trademonitor_v1.1.apk"]');
                    if (downloadLink) {
                        downloadLink.addEventListener('click', (e) => {
                            e.preventDefault();
                            const url = downloadLink.getAttribute('href');
                            startApkDownload(url);
                        });
                    }

                    function startApkDownload(url) {
                        const overlay = document.createElement('div');
                        overlay.style.position = 'fixed';
                        overlay.style.top = '0';
                        overlay.style.left = '0';
                        overlay.style.width = '100vw';
                        overlay.style.height = '100vh';
                        overlay.style.backgroundColor = 'rgba(2, 6, 23, 0.85)';
                        overlay.style.backdropFilter = 'blur(10px)';
                        overlay.style.webkitBackdropFilter = 'blur(10px)';
                        overlay.style.display = 'flex';
                        overlay.style.alignItems = 'center';
                        overlay.style.justifyContent = 'center';
                        overlay.style.zIndex = '9999999';
                        overlay.style.opacity = '0';
                        overlay.style.transition = 'opacity 0.3s ease';

                        const modal = document.createElement('div');
                        modal.style.background = 'rgba(15, 23, 42, 0.95)';
                        modal.style.border = '1px solid rgba(255, 255, 255, 0.08)';
                        modal.style.borderRadius = '24px';
                        modal.style.padding = '2.5rem';
                        modal.style.width = '90%';
                        modal.style.maxWidth = '400px';
                        modal.style.boxShadow = '0 25px 50px -12px rgba(0, 0, 0, 0.5)';
                        modal.style.textAlign = 'center';
                        modal.style.fontFamily = "'Inter', system-ui, sans-serif";
                        modal.style.color = '#f8fafc';
                        modal.style.transform = 'scale(0.9)';
                        modal.style.transition = 'transform 0.3s ease';

                        const icon = document.createElement('div');
                        icon.style.marginBottom = '1.25rem';
                        icon.innerHTML = `<div style="width: 60px; height: 60px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 18px; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); animation: download-pulse 2s infinite;">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                        </div>`;
                        
                        if (!document.getElementById('download-pulse-style')) {
                            const style = document.createElement('style');
                            style.id = 'download-pulse-style';
                            style.innerHTML = `
                                @keyframes download-pulse {
                                    0% { transform: scale(1); opacity: 1; }
                                    50% { transform: scale(1.1); opacity: 0.8; }
                                    100% { transform: scale(1); opacity: 1; }
                                }
                            `;
                            document.head.appendChild(style);
                        }

                        const title = document.createElement('h3');
                        title.innerText = 'App wird geladen...';
                        title.style.margin = '0 0 0.5rem 0';
                        title.style.fontSize = '1.35rem';
                        title.style.fontWeight = '700';

                        const sizeInfo = document.createElement('p');
                        sizeInfo.innerText = 'Dateigröße: 8,7 MB';
                        sizeInfo.style.margin = '0 0 1.5rem 0';
                        sizeInfo.style.color = '#94a3b8';
                        sizeInfo.style.fontSize = '0.9rem';

                        const progressBg = document.createElement('div');
                        progressBg.style.background = 'rgba(2, 6, 23, 0.4)';
                        progressBg.style.border = '1px solid rgba(255, 255, 255, 0.08)';
                        progressBg.style.borderRadius = '10px';
                        progressBg.style.height = '12px';
                        progressBg.style.width = '100%';
                        progressBg.style.overflow = 'hidden';
                        progressBg.style.marginBottom = '0.6rem';

                        const progressFill = document.createElement('div');
                        progressFill.style.height = '100%';
                        progressFill.style.width = '0%';
                        progressFill.style.background = 'linear-gradient(90deg, #10b981 0%, #06b6d4 100%)';
                        progressFill.style.transition = 'width 0.1s ease';

                        const progressText = document.createElement('div');
                        progressText.innerText = '0%';
                        progressText.style.fontWeight = '700';
                        progressText.style.fontSize = '1.1rem';
                        progressText.style.color = '#10b981';
                        progressText.style.marginBottom = '1.5rem';

                        const cancelBtn = document.createElement('button');
                        cancelBtn.innerText = 'Abbrechen';
                        cancelBtn.style.width = '100%';
                        cancelBtn.style.padding = '0.75rem';
                        cancelBtn.style.background = 'rgba(255, 255, 255, 0.05)';
                        cancelBtn.style.border = '1px solid rgba(255, 255, 255, 0.1)';
                        cancelBtn.style.borderRadius = '12px';
                        cancelBtn.style.color = '#94a3b8';
                        cancelBtn.style.fontWeight = '600';
                        cancelBtn.style.cursor = 'pointer';
                        cancelBtn.style.transition = 'all 0.2s';
                        
                        cancelBtn.onmouseover = () => {
                            cancelBtn.style.background = 'rgba(239, 68, 68, 0.1)';
                            cancelBtn.style.color = '#f87171';
                            cancelBtn.style.borderColor = 'rgba(239, 68, 68, 0.2)';
                        };
                        cancelBtn.onmouseout = () => {
                            cancelBtn.style.background = 'rgba(255, 255, 255, 0.05)';
                            cancelBtn.style.color = '#94a3b8';
                            cancelBtn.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                        };

                        progressBg.appendChild(progressFill);
                        modal.appendChild(icon);
                        modal.appendChild(title);
                        modal.appendChild(sizeInfo);
                        modal.appendChild(progressBg);
                        modal.appendChild(progressText);
                        modal.appendChild(cancelBtn);
                        overlay.appendChild(modal);
                        document.body.appendChild(overlay);

                        requestAnimationFrame(() => {
                            overlay.style.opacity = '1';
                            modal.style.transform = 'scale(1)';
                        });

                        const controller = new AbortController();
                        const signal = controller.signal;

                        cancelBtn.addEventListener('click', () => {
                            controller.abort();
                            closeModal();
                        });

                        function closeModal() {
                            overlay.style.opacity = '0';
                            modal.style.transform = 'scale(0.9)';
                            setTimeout(() => {
                                if (overlay.parentNode) {
                                    overlay.parentNode.removeChild(overlay);
                                }
                            }, 300);
                        }

                        fetch(url, { signal })
                            .then(response => {
                                if (!response.ok) throw new Error('Netzwerk-Antwort war nicht OK');
                                const contentLength = response.headers.get('content-length');
                                const totalBytes = contentLength ? parseInt(contentLength, 10) : 9117676;
                                const reader = response.body.getReader();
                                let loadedBytes = 0;
                                const chunks = [];

                                function read() {
                                    return reader.read().then(({ done, value }) => {
                                        if (done) {
                                            return new Blob(chunks, { type: 'application/vnd.android.package-archive' });
                                        }
                                        loadedBytes += value.length;
                                        chunks.push(value);
                                        const pct = Math.round((loadedBytes / totalBytes) * 100);
                                        progressFill.style.width = `${pct}%`;
                                        progressText.innerText = `${pct}%`;
                                        return read();
                                    });
                                }
                                return read();
                            })
                            .then(blob => {
                                icon.innerHTML = `<div style="width: 60px; height: 60px; background: #10b981; border-radius: 18px; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                </div>`;
                                title.innerText = 'Heruntergeladen!';
                                progressText.innerText = 'Fertig';
                                cancelBtn.style.display = 'none';

                                const downloadLink = document.createElement('a');
                                downloadLink.href = URL.createObjectURL(blob);
                                downloadLink.download = 'trademonitor_v1.1.apk';
                                document.body.appendChild(downloadLink);
                                downloadLink.click();
                                document.body.removeChild(downloadLink);

                                setTimeout(closeModal, 1500);
                            })
                            .catch(error => {
                                if (error.name === 'AbortError') return;
                                icon.innerHTML = `<div style="width: 60px; height: 60px; background: #ef4444; border-radius: 18px; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="18" y1="6" x2="6" y2="18"></line>
                                        <line x1="6" y1="6" x2="18" y2="18"></line>
                                    </svg>
                                </div>`;
                                title.innerText = 'Fehler beim Download';
                                sizeInfo.innerText = error.message || 'Verbindung fehlgeschlagen';
                                progressBg.style.display = 'none';
                                progressText.style.display = 'none';
                                cancelBtn.innerText = 'Schließen';
                                cancelBtn.style.background = 'rgba(239, 68, 68, 0.2)';
                                cancelBtn.style.color = '#f87171';
                                cancelBtn.style.borderColor = 'rgba(239, 68, 68, 0.4)';
                            });
                    }
                });
            </script>

            <div class="card-footer" style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 0.75rem;">
                <div style="font-size: 0.8125rem; color: #64748b;">
                    &copy; 2026 <a href="https://www.tnickel-ki.de" target="_blank" style="color: #3b82f6; text-decoration: none; font-weight: 500;">tnickel-ki</a>
                </div>
                <div style="display: flex; justify-content: center; gap: 1.25rem; font-size: 0.75rem; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 700;">
                    <a href="/impressum" style="color: #475569; text-decoration: none; transition: color 0.2s;">Impressum</a>
                    <a href="/privacy" style="color: #475569; text-decoration: none; transition: color 0.2s;">Datenschutz</a>
                    <a href="https://www.tnickel-ki.de" style="color: #475569; text-decoration: none; transition: color 0.2s;">Support</a>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
